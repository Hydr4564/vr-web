<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <!-- ★ここが全画面（アプリモード）にするための魔法のコード★ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- ★ここまで★ -->

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <style>
      #menu-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        background-color: rgba(0, 0, 0, 0.7); z-index: 9999;
      }
      .panel { background: white; padding: 30px; border-radius: 15px; text-align: center; }
      .btn-vr { background: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 30px; margin-top: 20px; cursor: pointer; width: 100%; }
      .btn-reload { background: #f1f2f6; color: #2f3542; border: 1px solid #ced6e0; padding: 10px 20px; font-size: 16px; border-radius: 10px; margin-top: 15px; cursor: pointer; width: 100%; }
      .version-text { color: #747d8c; font-size: 14px; margin-top: 10px; }
    </style>

    <script>
      AFRAME.registerComponent('hide-on-click', {
        init: function () {
          this.el.addEventListener('click', function () {
            this.setAttribute('visible', 'false');
          });
        }
      });
      function startVR() {
        var scene = document.querySelector('a-scene');
        document.getElementById('menu-screen').style.display = 'none';
        scene.enterVR();
      }
      window.addEventListener('load', function () {
        var scene = document.querySelector('a-scene');
        scene.addEventListener('exit-vr', function () {
          document.getElementById('menu-screen').style.display = 'flex';
        });
      });
    </script>
  </head>
  <body>
    <div id="menu-screen">
      <div class="panel">
        <h2 style="margin-top:0;">的当てVRゲーム</h2>
        <p>スマホを横向きにして<br>ボタンを押してください</p>
        <button class="btn-vr" onclick="startVR()">🥽 VRモードで開始</button>
        <button class="btn-reload" onclick="location.reload(true)">🔄 画面を最新に更新</button>
        <p class="version-text">現在のバージョン: 2.1</p>
      </div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
      <a-camera><a-cursor fuse="true" fuse-timeout="1500" color="yellow"></a-cursor></a-camera>
      <a-sphere position="0 1.5 -3" radius="0.5" color="#EF2D5E" hide-on-click></a-sphere>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
  </body>
</html>
