<!doctype html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script>
      // 見つめると消える仕組み
      AFRAME.registerComponent("hide-on-click", {
        init: function () {
          this.el.addEventListener("click", function (evt) {
            this.setAttribute("visible", "false");
          });
        },
      });
    </script>
  </head>
  <body>
    <!-- vr-mode-ui="enabled: true" は標準のVRボタンを表示する設定です -->
    <a-scene vr-mode-ui="enabled: true">
      <a-camera>
        <a-cursor fuse="true" fuse-timeout="1500" color="yellow"></a-cursor>
      </a-camera>
      <a-sphere
        position="0 1.5 -3"
        radius="0.5"
        color="#EF2D5E"
        hide-on-click
      ></a-sphere>
      <a-sky color="#ECECEC"></a-sky>
    </a-scene>

    <!-- 画面全体をタップした時に、強制的にVRの2画面モードを起動するスクリプト -->
    <script>
      document.querySelector("a-scene").addEventListener("click", function () {
        this.enterVR(); // これが「2眼に分割してVR空間に入る」という命令です
      });
    </script>
  </body>
</html>
